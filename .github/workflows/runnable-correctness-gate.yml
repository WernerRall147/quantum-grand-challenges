name: Runnable Correctness Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  runnable-correctness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib pandas pyyaml jsonschema

      - name: Run runnable/correctness audit
        run: |
          python tooling/reporting/problem_runnable_correctness_audit.py --classical-timeout 180

      - name: Enforce all problems pass
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("tooling/reporting/problem_runnable_correctness_report.json")
          payload = json.loads(report_path.read_text(encoding="utf-8"))
          summary = payload.get("summary", {})
          total = int(summary.get("total", 0) or 0)
          passed = int(summary.get("passed", 0) or 0)

          failures = [
              p for p in payload.get("problems", [])
              if not p.get("runnable_and_correct_signal", False)
          ]

          print(f"Runnable/correctness summary: {passed}/{total}")
          if failures:
              print("Failing problems:")
              for problem in failures:
                  pid = problem.get("problem_id", "unknown")
                  reason = (
                      (problem.get("classical") or {}).get("stderr_tail")
                      or (problem.get("qsharp") or {}).get("stderr_tail")
                      or "unknown error"
                  )
                  reason = str(reason).strip().splitlines()[0]
                  print(f"- {pid}: {reason}")

          if passed != total:
              raise SystemExit(1)
          PY

      - name: Upload runnable/correctness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runnable-correctness-report
          path: |
            tooling/reporting/problem_runnable_correctness_report.json
            website/data/problemRunnableCorrectnessReport.json
          retention-days: 30
