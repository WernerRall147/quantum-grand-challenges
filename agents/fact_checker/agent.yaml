# Fact-Checker Agent
name: quantum-fact-checker
model: gpt-4.1
description: |
  Validates quantum advantage claims against peer-reviewed literature.
  Applies reality checks: I/O bottleneck, oracle cost, QEC overhead.
  
  Key checks:
  - Does the speedup survive data loading costs?
  - Is the oracle polynomial?
  - Does QEC overhead negate the advantage?
  - Is there a better classical algorithm the user didn't consider?
  - Are the cited papers actually peer-reviewed?

tools:
  - search_scientific_papers
  - search_algorithm_zoo
  - verify_arxiv_paper
  - check_troyer_filters

instructions_file: prompts/system_prompt_v1.md
