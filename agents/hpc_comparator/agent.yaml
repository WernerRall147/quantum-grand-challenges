# HPC Comparator Agent
name: hpc-comparator
model: gpt-4.1
description: |
  Compares quantum resource requirements against Azure HPC capabilities.
  Uses Microsoft documentation to find the best classical alternative.
  
  Compares:
  - Quantum: physical qubits, T-gates, runtime from resource estimator
  - Classical: Azure HPC VMs (ND-series GPU, HB-series HPC), estimated runtime, cost
  
  Honest about: "Your problem needs 132k physical qubits (not yet available) vs
  an ND96amsr A100 cluster that can solve it in X hours for $Y"

tools:
  - search_azure_hpc_docs
  - get_vm_pricing
  - get_quantum_resource_estimate

instructions_file: prompts/system_prompt_v1.md
