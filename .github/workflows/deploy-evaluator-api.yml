name: Deploy Evaluator API

# Build and deploy the FastAPI evaluator container to Azure Container Apps.
#
# Triggers:
#   - Manual (workflow_dispatch) — recommended path
#   - On push to main when API code or Dockerfile changes (auto-deploy)
#
# Required secrets (configure in repo Settings -> Secrets and variables -> Actions):
#   AZURE_CLIENT_ID         — service principal app id (qgc-agent-sp)
#   AZURE_CLIENT_SECRET     — service principal secret
#
# Tenant + subscription IDs are hardcoded below (not sensitive — public identifiers
# of the Azure tenant/sub the SP belongs to).
#
# Optional repo VARIABLES (override defaults if your resources differ):
#   ACR_NAME                — Azure Container Registry name (default: qgcregistry)
#   ACR_IMAGE_NAME          — image repository inside the ACR (default: qgc-evaluator)
#   CONTAINER_APP_NAME      — Container App name (default: qgc-eval-api)
#   CONTAINER_APP_RG        — Resource group containing the Container App (default: qgc-evaluator)
#
# Local equivalent (after `az login --tenant <id>`):
#   az acr build --registry qgcregistry --image qgc-evaluator:<tag> --file Dockerfile .
#   az containerapp update --name qgc-eval-api --resource-group qgc-evaluator \
#       --image qgcregistry.azurecr.io/qgc-evaluator:<tag>

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: short SHA)"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "agents/api/**"
      - "agents/orchestrator/**"
      - "agents/classifier/**"
      - "agents/code_generator/**"
      - "knowledge/search/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy-evaluator-api.yml"

permissions:
  contents: read

concurrency:
  group: deploy-evaluator-api
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag and names
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v$(date -u +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "acr_name=${{ vars.ACR_NAME || 'qgcregistry' }}" >> $GITHUB_OUTPUT
          echo "image_name=${{ vars.ACR_IMAGE_NAME || 'qgc-evaluator' }}" >> $GITHUB_OUTPUT
          echo "app_name=${{ vars.CONTAINER_APP_NAME || 'qgc-eval-api' }}" >> $GITHUB_OUTPUT
          echo "app_rg=${{ vars.CONTAINER_APP_RG || 'qgc-evaluator' }}" >> $GITHUB_OUTPUT

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "dc692f3e-104b-4247-b52c-23692694684a",
              "subscriptionId": "82cd08af-0dac-4fc5-8a3a-f2ab9e4679c3"
            }

      - name: Build container image in ACR
        run: |
          az acr build \
            --registry "${{ steps.tag.outputs.acr_name }}" \
            --image "${{ steps.tag.outputs.image_name }}:${{ steps.tag.outputs.image_tag }}" \
            --image "${{ steps.tag.outputs.image_name }}:latest" \
            --file Dockerfile \
            .

      - name: Update Container App revision
        run: |
          az containerapp update \
            --name "${{ steps.tag.outputs.app_name }}" \
            --resource-group "${{ steps.tag.outputs.app_rg }}" \
            --image "${{ steps.tag.outputs.acr_name }}.azurecr.io/${{ steps.tag.outputs.image_name }}:${{ steps.tag.outputs.image_tag }}"

      - name: Wait for revision and health-check
        run: |
          set -e
          FQDN=$(az containerapp show \
            --name "${{ steps.tag.outputs.app_name }}" \
            --resource-group "${{ steps.tag.outputs.app_rg }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "FQDN: $FQDN"

          # Allow up to 90s for revision activation
          for i in $(seq 1 18); do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API healthy."
              exit 0
            fi
          done
          echo "::error::API did not return 200 after 90s"
          exit 1

      - name: Smoke-test new endpoints
        run: |
          set -e
          FQDN=$(az containerapp show \
            --name "${{ steps.tag.outputs.app_name }}" \
            --resource-group "${{ steps.tag.outputs.app_rg }}" \
            --query properties.configuration.ingress.fqdn -o tsv)

          # OpenAPI should advertise /api/generate-bicep
          OPENAPI=$(curl -sf "https://${FQDN}/openapi.json" || echo "")
          if echo "$OPENAPI" | grep -q "/api/generate-bicep"; then
            echo "/api/generate-bicep endpoint is registered."
          else
            echo "::error::/api/generate-bicep not found in OpenAPI spec"
            exit 1
          fi

          # Schema check: EvaluateResponse should expose bicep_template
          if echo "$OPENAPI" | grep -q "bicep_template"; then
            echo "EvaluateResponse exposes bicep_template field."
          else
            echo "::error::bicep_template missing from EvaluateResponse"
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "### Evaluator API Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ steps.tag.outputs.acr_name }}.azurecr.io/${{ steps.tag.outputs.image_name }}:${{ steps.tag.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Container App: \`${{ steps.tag.outputs.app_name }}\` in \`${{ steps.tag.outputs.app_rg }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
