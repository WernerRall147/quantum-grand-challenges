name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ci-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: pip-ci-${{ runner.os }}-
      - name: Install dependencies
        run: pip install numpy scipy matplotlib pandas pytest jsonschema pyyaml qsharp
      - name: Validate Q# compilation
        run: python tooling/ci_validate_qsharp.py
      - name: Run Q# entry points
        run: python tooling/run_all_qsharp.py
      - name: Validate JSON schemas
        run: python tooling/ci_validate_schema.py
      - name: Run pytest baseline tests
        run: pytest conftest.py -k "test_baseline" --tb=short -q
      - name: Enforce maturity contract
        run: python tooling/reporting/stage_kpis.py --policy tooling/reporting/maturity-policy.json --enforce
      - name: QAOA estimator smoke
        run: cd problems/archived/05_qaoa_maxcut && make estimate-all
      - name: Verify QAOA evidence
        run: |
          python problems/archived/05_qaoa_maxcut/python/validate_estimator_summary.py
          python problems/archived/05_qaoa_maxcut/python/validate_backend_assumptions.py
          python problems/archived/05_qaoa_maxcut/python/validate_evidence_quality.py
      - name: QAE runtime config + Q# check
        run: |
          python problems/archived/03_qae_risk/python/write_runtime_config.py \
            --loss-qubits 4 --threshold 2.5 --mean 0.0 --std-dev 1.0 \
            --precision-bits 6 --repetitions 120 --run-sanity-check false
          python -c "import qsharp; qsharp.init(project_root='problems/archived/03_qae_risk/qsharp'); print('QAE Q# OK')"
      - name: Evaluator smoke tests
        run: pytest agents/tests/test_evaluator_smoke.py -v --tb=short
      - name: Verify matrix freshness + website schema
        run: |
          # Matrix freshness shells out to `make` per problem and can drift for
          # archived problems; treat as advisory (same policy as the nightly job)
          # so a stale matrix doesn't block CI. Website schema stays enforced.
          python tooling/reporting/check_verification_matrix_freshness.py || echo "::warning::Verification matrix stale — see the nightly job for the authoritative refresh"
          python tooling/reporting/validate_website_data_schema.py
  quick-estimation:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-est-${{ runner.os }}
          restore-keys: pip-ci-${{ runner.os }}-
      - name: Install dependencies
        run: pip install numpy scipy jsonschema pyyaml
      - name: Validate estimation schemas
        run: |
          for f in problems/*/estimates/*.json problems/archived/*/estimates/*.json; do
            [ -f "$f" ] && python -c "
          import json, jsonschema
          schema = json.load(open('tooling/schema/result.json'))
          jsonschema.validate(json.load(open('$f')), schema)
          print('OK: $f')
          " || true
          done
