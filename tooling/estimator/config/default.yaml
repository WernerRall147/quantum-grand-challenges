# Default estimator configuration for Quantum Grand Challenges
# Defines reference problems, target profiles, and instance metadata
problems:
- id: "01_hubbard"
  path: "problems/01_hubbard"
  algorithm: "vqe_demo"
  qs_file: "qsharp/Program.qs"
  instance:
    name: "small"
    description: "Two-site Hubbard half-filling demo instance"
    file: "instances/small.yaml"
  estimator_params:
    entry_point: "RunTwoSiteHubbardAnalysis"
    entry_point_flag: "--operation"
    parameters: {}
  targets:
  - "surface_code_generic_v1"
  - "qubit_gate_ns_e3"
