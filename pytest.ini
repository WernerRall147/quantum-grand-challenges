[pytest]
testpaths =
    problems
python_files = test_*.py
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
addopts = -v --tb=short --import-mode=importlib
    --ignore=problems/03_qae_risk/python/test_analyze_parser.py
    --ignore=problems/03_qae_risk/python/test_update_calibration_history.py
    --ignore=problems/03_qae_risk/python/test_iqae.py
