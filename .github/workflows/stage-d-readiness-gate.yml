name: Stage D Readiness Gate

on:
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  stage-d-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Stage D readiness audit
        run: python tooling/reporting/stage_d_readiness_audit.py

      - name: Enforce readiness
        run: |
          python -c "
          import json; from pathlib import Path
          p = json.loads(Path('tooling/reporting/stage_d_readiness_report.json').read_text())
          s = p.get('summary', {})
          ready = int(s.get('fully_ready', 0)); total = int(s.get('candidate_count', 0))
          open_items = int(s.get('open_checklist_items', 0)); issues = int(s.get('artifact_issue_count', 0))
          print(f'Stage D: {ready}/{total} ready, {open_items} open items, {issues} artifact issues')
          if ready != total or open_items or issues: raise SystemExit(1)
          "
